<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{{ page.title | default: site.title | escape }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="{% if page.url == '/' %}home{% else %}post{% endif %}">
  <aside class="profile-rail" aria-label="site profile">
    <div class="profile-cover"></div>
    <div class="avatar">SN</div>
    <h1 class="profile-title">siyuan-notes</h1>
    <p class="profile-quote">&#35760;&#24405;&#12289;&#25972;&#29702;&#12289;&#20998;&#20139;</p>
    <nav class="profile-nav" aria-label="site navigation">
      <a href="{{ '/' | relative_url }}">&#39318;&#39029;</a>
      <a href="{{ '/content/posts/' | relative_url }}">&#25991;&#31456;</a>
      <a href="https://github.com/khnsojina-arch/siyuan-notes">GitHub</a>
    </nav>
  </aside>

  <div class="site-frame">
    <header class="mobile-header">
      <a href="{{ '/' | relative_url }}">siyuan-notes</a>
      <a href="https://github.com/khnsojina-arch/siyuan-notes">GitHub</a>
    </header>

    <main class="content-grid">
      <section class="content-main">
        {% if page.url != '/' %}
        <nav class="breadcrumb" aria-label="breadcrumb">
          <a href="{{ '/' | relative_url }}">&#39318;&#39029;</a>
          <span>{{ page.title | default: '&#31508;&#35760;' }}</span>
        </nav>
        {% endif %}

        <article class="paper">
          <header class="paper-header">
            <h1>{{ page.title | default: site.title }}</h1>
            {% if page.date %}<time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>{% endif %}
          </header>
          <div class="note-content">
            {{ content }}
          </div>
        </article>
      </section>

      <aside class="outline-panel" aria-label="outline">
        <div class="outline-title">&#30446;&#24405;</div>
        <nav id="toc-list"></nav>
      </aside>
    </main>
  </div>

  <script>
    const article = document.querySelector('.note-content');
    const toc = document.querySelector('#toc-list');
    const panel = document.querySelector('.outline-panel');
    const isHome = document.body.classList.contains('home');
    if (article && toc && panel) {
      if (isHome) {
        toc.innerHTML = '<a href="#notes">&#24050;&#21457;&#24067;&#31508;&#35760;</a>';
      } else {
        const headings = [...article.querySelectorAll('h2, h3, h4, h5')];
        if (!headings.length) panel.classList.add('is-empty');
        const seen = new Map();
        headings.forEach((heading) => {
          const raw = heading.textContent.trim();
          const base = raw.toLowerCase().replace(/\s+/g, '-').replace(/[\\/#?%:<>|"'`]/g, '');
          const count = seen.get(base) || 0;
          seen.set(base, count + 1);
          heading.id = heading.id || `${base || 'section'}${count ? '-' + count : ''}`;
          const link = document.createElement('a');
          link.href = `#${heading.id}`;
          link.textContent = raw;
          link.className = heading.tagName.toLowerCase();
          toc.appendChild(link);
        });
      }
    }
  </script>
</body>
</html>
